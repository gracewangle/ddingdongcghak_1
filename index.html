      .nav-btn{width:100%;border-radius:14px}
      .hero{padding:22px 18px}
      .hero h1{font-size:25px}
      .hero-actions .btn{width:100%;border-radius:14px}
      .product-meta{grid-template-columns:1fr}
      .settlement-amount-grid{grid-template-columns:1fr}
    }

    @media (min-width:720px){
      .page{padding-top:30px}
      .product-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .admin-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .admin-nav-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
      .dashboard-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .status-pill-grid{grid-template-columns:repeat(6,minmax(0,1fr))}
      .date-filter-grid{grid-template-columns:220px 220px auto}
      .curator-settlement-filters{grid-template-columns:1fr 1fr minmax(180px,1.4fr) 160px 96px;align-items:end}
      .hero{grid-template-columns:1fr auto;align-items:center}
      .hero-actions{justify-content:flex-end}
      .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .option-row{grid-template-columns:minmax(0,1.4fr) minmax(0,.8fr) minmax(0,.8fr) auto;align-items:end}
      .calc-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .period-group{grid-template-columns:repeat(2,minmax(0,1fr));align-items:start}
      .period-group-head{grid-column:1/-1}
      .preview-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .form-actions{grid-template-columns:1fr 1fr}
      .manage-actions{grid-template-columns:repeat(3,minmax(0,1fr))}
      .admin-order-summary{grid-template-columns:repeat(4,minmax(0,1fr))}
      .admin-order-head{grid-template-columns:minmax(0,1fr) 220px;align-items:start}
      .admin-order-status{justify-items:end}
    }
    @media (min-width:768px){
      .admin-order-table-wrap{display:block}
      .admin-order-card-list{display:none}
      .curator-sales-table-wrap{display:block}
      .curator-sales-card-list{display:none}
    }
    @media (max-width:420px){
      .detail-summary{grid-template-columns:82px minmax(0,1fr);padding:12px}
      .detail-summary-thumb{width:82px}
      .detail-summary-info h2{font-size:19px}
      .curator-sales-search{grid-template-columns:1fr}
    }
  </style>
</head>

    function readJson(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(raw === null) return fallback;
        const parsed = JSON.parse(raw);
        return Array.isArray(fallback) && !Array.isArray(parsed) ? fallback : parsed;
      }catch(error){
        return fallback;
      }
    }

    function toNumber(value){

    function readFileAsDataUrl(file){
      return new Promise(function(resolve, reject){
        const reader = new FileReader();
        reader.onload = function(){ resolve(String(reader.result || "")); };
        reader.onerror = function(){ reject(reader.error); };
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src){
      return new Promise(function(resolve, reject){
        const image = new Image();
        image.onload = function(){ resolve(image); };
        image.onerror = reject;
        image.src = src;
      });
    }

    async function compressImageFile(file){
      const dataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(dataUrl);
      const scale = Math.min(1, IMAGE_MAX_WIDTH / image.width);
      const width = Math.max(1, Math.round(image.width * scale));
      const height = Math.max(1, Math.round(image.height * scale));
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;
      context.fillStyle = "#fff";
      context.fillRect(0, 0, width, height);
      context.drawImage(image, 0, 0, width, height);
      return canvas.toDataURL("image/jpeg", IMAGE_JPEG_QUALITY);
    }

    function getRefFromUrl(){
      const searchParams = new URLSearchParams(location.search || "");
      let ref = searchParams.get("ref");
      if(!ref && location.hash.includes("?")){
        const hashQuery = location.hash.split("?")[1] || "";
        const hashParams = new URLSearchParams(hashQuery);
        ref = hashParams.get("ref");
      }
      ref = (ref || "").trim();
      if(ref){
        localStorage.setItem(CURRENT_REF_KEY, ref);
        return ref;
      }
      localStorage.setItem(CURRENT_REF_KEY, "direct");
      return "direct";
    }

    function captureRefFromUrl(){
      const ref = getRefFromUrl();
      localStorage.setItem(CURRENT_REF_KEY, ref);
      return ref;
    }

      if(!value) return "-";
      return String(value).replaceAll("-", ".");
    }

    function getBaseItemName(product){
      return String(product?.baseItemName || product?.title || "상품").trim();
    }

    function getDeliveryLabel(product){
      const guideDate = product?.deliveryDate || productOrderDeadline(product);
      return String(product?.deliveryLabel || (guideDate ? formatDate(guideDate) + " 예약배송" : "예약배송")).trim();
    }

    function productOrderDeadline(product){
      return String(product?.orderDeadline || product?.deadline || "").trim();
    }

    function productPriceType(product){
      return product?.priceType === "commission" || product?.priceType === "share" ? "commission" : "supply";
    }

    function productVendorCommissionRate(product){
      return Number(product?.vendorCommissionRate ?? product?.revenueShareRate ?? 30);
    }

    function productConsumerPrice(product){
      return Number(product?.consumerPrice ?? product?.originalPrice ?? product?.salePrice ?? 0);
    }

    function productCuratorRecruitDeadline(product){
      return String(product?.curatorRecruitDeadline || "").trim();
    }

    function formatDateRange(startDate, endDate){
      const start = startDate ? formatDate(startDate) : "";
      const end = endDate ? formatDate(endDate) : "";
      if(start && end) return `${start} ~ ${end}`;
      if(start) return `${start}부터`;
      if(end) return `${end}까지`;
      return "";
    }

    function productSalePeriodLabel(product){
      const period = formatDateRange(product?.saleStartDate || "", productOrderDeadline(product));
      return period ? `판매기간 ${period}` : "판매기간 미설정";
    }

    function dateStart(value){
      if(!value) return null;
      const date = new Date(value + "T00:00:00");
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function todayStart(){
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function productOrderDdayLabel(product){
      const deadline = dateStart(productOrderDeadline(product));
      if(!deadline) return "마감 D-?";
      const diffDays = Math.round((deadline.getTime() - todayStart().getTime()) / 86400000);
      if(diffDays < 0) return "마감";
      return diffDays === 0 ? "마감 D-DAY" : `마감 D-${diffDays}`;
    }

    function getProductSaleState(product){
      const status = product?.status || "selling";
      if(status === "stopped" || status === "stop" || status === "paused" || status === "deleted" || status === "draft"){
        return {state:"stopped", label:"판매중지", canOrder:false};
      }
      if(status === "soldout" || isProductSoldOut(product)){
        return {state:"soldout", label:"SOLD OUT", canOrder:false};
      }
      const today = todayStart();
      const saleStart = dateStart(product?.saleStartDate || "");
      const orderDeadline = dateStart(productOrderDeadline(product));
      if(saleStart && today < saleStart){
        return {state:"comingSoon", label:"COMING SOON", canOrder:false};
      }
      if(orderDeadline && today > orderDeadline){
        return {state:"closed", label:"주문마감", canOrder:false};
      }
      return {state:"selling", label:"주문 가능", canOrder:true};
    }

    function canCuratorApplyProduct(product){
      if(!product) return false;
      const status = product.status || "selling";
      if(["stopped","stop","paused","deleted","draft"].includes(status)) return false;
      if(status === "soldout" || isProductSoldOut(product)) return false;
      const today = todayStart();
      const recruitDeadline = dateStart(productCuratorRecruitDeadline(product));
      if(recruitDeadline && today > recruitDeadline) return false;
      const orderDeadline = dateStart(productOrderDeadline(product));
      if(orderDeadline && today > orderDeadline) return false;
      return true;
    }

    function curatorApplyButtonLabel(product){
      const today = todayStart();
      const recruitDeadline = dateStart(productCuratorRecruitDeadline(product));
      if(recruitDeadline && today > recruitDeadline) return "신청 마감";
      return "공동구매 신청";
    }

      }
      rows.push(["공동구매 시작일", product?.saleStartDate ? formatDate(product.saleStartDate) : ""]);
      if(mode !== "buyer"){
        rows.push(["주문 마감일", productOrderDeadline(product) ? formatDate(productOrderDeadline(product)) : ""]);
      }
      if(product.deliveryDate) rows.push(["배송/수령 예정일", formatDate(product.deliveryDate)]);
      return rows.filter(function(row){ return row[1]; }).map(function(row){

    function renderHomeStatusBadges(product, saleState){

        return `<span class="badge coming">COMING SOON · ${escapeHtml(openDate)}</span>`;

      const label = productOrderDdayLabel(product);
      return `<span class="badge ${state.canOrder ? "" : "gray"}">${escapeHtml(label)}</span>`;

    function buyerSaleLabel(product){
      const saleState = getProductSaleState(product);
      if(saleState.state === "comingSoon"){
        return `${product.saleStartDate ? formatDate(product.saleStartDate) + " 오픈예정" : "오픈예정"}`;
      }
      if(saleState.state === "closed") return "주문마감";
      if(saleState.state === "soldout") return "SOLD OUT";
      return productOrderDeadline(product) ? `주문마감 ${formatDate(productOrderDeadline(product))}` : saleState.label;

      if(label === "핫딜") return "hot";
      if(label === "인기") return "popular";
      if(label === "신상품") return "new";
      if(label === "품절임박") return "low";
      return "";
    }

    function isValidDateString(value){
      if(!value) return true;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
      const parts = value.split("-").map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      return date.getFullYear() === parts[0]
        && date.getMonth() === parts[1] - 1
        && date.getDate() === parts[2];
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

      const key = homeOptionKey(productId, optionId || "base_" + productId);
      const nextQuantity = Math.max(0, Number(quantity || 0));

    function isProductSoldOut(product){
      return normalizedProductOptions(product).every(function(option){

      });

    function getHomeQuickSelections(products){
      return products.flatMap(function(product){
        if(!getProductSaleState(product).canOrder) return [];
        return normalizedProductOptions(product).map(function(option){
          const quantity = getHomeQuickQuantity(product.id, option.id);
          const optionPrice = Number(option.price || 0);
          return {
            product: product,
            option: option,
            quantity: quantity,
            saleAmount: optionPrice * quantity,
            shippingFee: quantity > 0 ? Number(product.shippingFee || 0) : 0
          };
        });
      }).filter(function(item){
        return item.quantity > 0;
      });
    }

    function getHomeQuickProductSelections(products){
      const map = new Map();
      getHomeQuickSelections(products).forEach(function(selection){
        const existing = map.get(selection.product.id) || {
          product: selection.product,
          quantity: 0,
          saleAmount: 0,
          shippingFee: 0,
          items: []
        };
        existing.quantity += selection.quantity;
        existing.saleAmount += selection.saleAmount;
        existing.shippingFee = Number(selection.product.shippingFee || 0);
        existing.items.push(selection);
        map.set(selection.product.id, existing);
      });
      return Array.from(map.values()).map(function(selection){
        return {
          product: selection.product,
          quantity: selection.quantity,
          saleAmount: selection.saleAmount,
          shippingFee: selection.quantity > 0 ? selection.shippingFee : 0,
          items: selection.items
        };
      });
    }

      homeQuickOrderDraft = {

    function normalizedProductOptions(product){
      const options = Array.isArray(product.options) ? product.options : [];
      const baseStock = product.baseStock !== undefined
        ? Number(product.baseStock || 0)
        : product.stock !== undefined
          ? Number(product.stock || 0)

        itemType: "base",
        name: getBaseItemName(product),
        price: Number(product.salePrice || 0),
        stock: baseStock
      };
      const optionItems = options.length
        ? options.map(function(option, index){

            itemType: "option",
            name: option.name || "기본 옵션",
            price: Number(option.price || product.salePrice || 0),
            stock: Number(option.stock || 0)
          };
        })
        : [];

    function renderOrderOptionCard(option, saleState){
      const stock = option.itemType === "base"
        ? option.stock !== undefined ? Number(option.stock) : 9999
        : Number(option.stock || 0);
      const state = saleState || {state:"selling", label:"주문 가능", canOrder:true};
      const soldOut = stock <= 0 || !state.canOrder;
      return `
        <article class="order-option-card ${soldOut ? "is-soldout" : ""}" data-order-option="${escapeHtml(option.id)}" data-item-type="${escapeHtml(option.itemType || "option")}" data-option-name="${escapeHtml(option.name)}" data-option-price="${Number(option.price || 0)}" data-option-stock="${stock}">
          <div class="order-option-info">
            <strong>${escapeHtml(option.name)}</strong>
            <span>${formatPrice(option.price)} · ${soldOut ? `<b class="soldout">${escapeHtml(state.state === "soldout" || stock <= 0 ? "SOLD OUT" : state.label)}</b>` : `재고 ${stock}개`}</span>
          </div>
          <div class="qty-control">
            <button class="qty-btn" type="button" data-qty-minus ${soldOut ? "disabled" : ""}>-</button>
            <span class="qty-value" data-qty-value>0</span>
            <button class="qty-btn" type="button" data-qty-plus ${soldOut ? "disabled" : ""}>+</button>
          </div>
        </article>
      `;
    }

    function selectedOrderItems(){
      return Array.from(document.querySelectorAll("[data-order-option]")).map(function(card){
        const quantity = Number(toNumber(card.querySelector("[data-qty-value]")?.textContent));
        const optionPrice = Number(toNumber(card.dataset.optionPrice));
        return {
          itemType: card.dataset.itemType || "option",
          optionId: card.dataset.orderOption,
          optionName: card.dataset.optionName || "",
          optionPrice: optionPrice,
          quantity: quantity,
          lineTotal: optionPrice * quantity
        };
      }).filter(function(item){
        return item.quantity > 0;
      });
    }

    function updateOrderTotal(){
      const items = selectedOrderItems();
      const productId = document.getElementById("orderForm")?.dataset.orderProduct || "";
      const product = getProducts().find(function(item){ return item.id === productId; });
      const saleAmount = items.reduce(function(sum, item){ return sum + item.lineTotal; }, 0);
      const shippingFee = items.length ? Number(product?.shippingFee || 0) : 0;
      const totalPrice = saleAmount + shippingFee;
      const saleTarget = document.getElementById("orderSaleAmount");
      const shipTarget = document.getElementById("orderShippingFee");
      const totalTarget = document.getElementById("orderTotalPrice");
      if(saleTarget) saleTarget.textContent = formatPrice(saleAmount);
      if(shipTarget) shipTarget.textContent = formatPrice(shippingFee);
      if(totalTarget) totalTarget.textContent = formatPrice(totalPrice);
      document.querySelectorAll("[data-pay-sale]").forEach(function(target){
        target.textContent = formatPrice(saleAmount);
      });
      document.querySelectorAll("[data-pay-shipping]").forEach(function(target){
        target.textContent = formatPrice(shippingFee);
      });
      document.querySelectorAll("[data-pay-total]").forEach(function(target){
        target.textContent = formatPrice(totalPrice);
      });
    }

    function setOrderFormError(message){
      const errorBox = document.getElementById("orderFormError");
      if(!errorBox) return;
      errorBox.textContent = message || "";
      errorBox.classList.toggle("show", Boolean(message));
      if(message) errorBox.scrollIntoView({behavior:"smooth", block:"center"});
    }

    function submitGuestOrder(){
      const productId = document.getElementById("orderForm")?.dataset.orderProduct || "";
      const product = getProducts().find(function(item){ return item.id === productId; });
      setOrderFormError("");
      if(!product){ setOrderFormError("상품 정보를 찾을 수 없습니다."); return; }
      if((product.status || "selling") === "stopped"){ setOrderFormError("판매중지 상품은 주문할 수 없습니다."); return; }
      const saleState = getProductSaleState(product);
      if(!saleState.canOrder){ setOrderFormError(`${saleState.label} 상태라 현재 주문할 수 없습니다.`); return; }

      const selectedItems = selectedOrderItems();
      const items = selectedItems.map(function(item){
        const optionPrice = Number(item.optionPrice || 0);
        const quantity = Number(item.quantity || 0);
        return {
          itemType: item.itemType || "option",
          optionId: item.optionId || "",
          optionName: item.optionName || "",
          optionPrice: optionPrice,
          quantity: quantity,
          lineTotal: optionPrice * quantity
        };
      }).filter(function(item){ return item.quantity > 0; });
      const quantity = items.reduce(function(sum, item){ return sum + Number(item.quantity || 0); }, 0);
      const buyerNickname = document.getElementById("buyerNickname")?.value.trim() || "";
      const buyerPhone = document.getElementById("buyerPhone")?.value.trim() || "";
      const postalCode = "";
      const buyerAddress = document.getElementById("buyerAddress")?.value.trim() || "";
      const buyerAddressDetail = "";
      const entranceMethod = document.getElementById("entranceMethod")?.value.trim() || "";
      const orderMemo = document.getElementById("orderMemo")?.value.trim() || "";
      const saveBuyerInfo = Boolean(document.getElementById("saveBuyerInfo")?.checked);
      const paymentMethod = document.querySelector(".payment-card")?.dataset.paymentMethod || "bank";
      const depositorName = document.getElementById("depositorName")?.value.trim() || "";
      const payerName = document.getElementById("payerName")?.value.trim() || "";

      if(quantity < 1){ setOrderFormError("구매할 상품 수량을 1개 이상 선택해주세요."); return; }
      if(!buyerNickname){ setOrderFormError("단체카톡방 닉네임을 입력해주세요."); return; }
      if(!buyerPhone){ setOrderFormError("연락처를 입력해주세요."); return; }
      if(!buyerAddress){ setOrderFormError("주소를 입력해주세요."); return; }
      if(!entranceMethod){ setOrderFormError("출입방법을 입력해주세요."); return; }
      if(paymentMethod === "bank" && !depositorName){ setOrderFormError("입금자명을 입력해주세요."); return; }
      if(paymentMethod === "seoulpay" && !payerName){ setOrderFormError("결제자명을 입력해주세요."); return; }

      const saleAmount = items.reduce(function(sum, item){ return sum + Number(item.lineTotal || 0); }, 0);
      const shippingFee = quantity >= 1 ? Number(product.shippingFee || 0) : 0;
      const totalPrice = saleAmount + shippingFee;
      const ref = currentRef();
      const settlement = calculateOrderSettlement({productId: product.id, ref: ref, curatorId: ref, items: items, saleAmount: saleAmount}, product);
      const order = {
        id: "o_" + Date.now(),
        ref: ref,
        curatorId: ref,
        productId: product.id,
        productTitle: product.title || "",
        orderDeadline: product.orderDeadline || product.deadline || "",
        saleStartDate: product.saleStartDate || "",
        deliveryDate: product.deliveryDate || "",
        curatorRecruitDeadline: product.curatorRecruitDeadline || "",
        optionId: items[0]?.optionId || "",
        optionName: items.length === 1 ? items[0].optionName : items[0].optionName + " 외 " + (items.length - 1) + "개",
        items: items,
        quantity: quantity,
        saleAmount: saleAmount,
        supplyAmount: settlement.supplyAmount,
        vendorCommissionAmount: settlement.vendorCommissionAmount,
        curatorCommissionRate: settlement.curatorCommissionRate,
        curatorCommission: settlement.curatorCommission,
        grossMargin: settlement.grossMargin,
        localbeeProfit: settlement.localbeeProfit,
        shippingFee: shippingFee,
        totalPrice: totalPrice,
        buyerName: buyerNickname,
        buyerNickname: buyerNickname,
        buyerPhone: buyerPhone,
        postalCode: postalCode,
        buyerAddress: buyerAddress,
        buyerAddressDetail: buyerAddressDetail,
        entranceMethod: entranceMethod,
        orderMemo: orderMemo,
        saveBuyerInfo: saveBuyerInfo,
        depositorName: depositorName,
        payerName: paymentMethod === "seoulpay" ? payerName : "",
        paymentMethod: paymentMethod,
        status: "ordered",
        createdAt: new Date().toISOString()
      };

      const orders = readJson(STORAGE_KEYS.orders, []);
      orders.push(order);
      saveOrders(orders);
      if(saveBuyerInfo){
        writeJson(BUYER_INFO_KEY, {
          buyerNickname: buyerNickname,
          buyerPhone: buyerPhone,
          postalCode: postalCode,
          buyerAddress: buyerAddress,
          buyerAddressDetail: buyerAddressDetail,
          entranceMethod: entranceMethod,
          orderMemo: orderMemo,
          saveBuyerInfo: true
        });
      }else{
        localStorage.removeItem(BUYER_INFO_KEY);
      }
      resetBuyerSelections();
      go("order/" + order.id);
    }

    function renderOrderItemSummary(order){
      if(Array.isArray(order.items) && order.items.length){
        return order.items.map(function(item){
          return `${escapeHtml(item.optionName)} × ${Number(item.quantity || 0)}개`;
        }).join("<br>");
      }
      return escapeHtml(order.optionName || "");
    }

    function orderStatusLabel(status){
      const found = ORDER_STATUS_OPTIONS.find(function(option){ return option[0] === status; });
      return found ? found[1] : "주문접수";
    }

    function paymentMethodLabel(method){
      return method === "seoulpay" ? "서울페이" : "현금(계좌)";
    }

    function formatDateTime(value){
      if(!value) return "-";
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return escapeHtml(value);
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
    }

    function orderItems(order){
      if(Array.isArray(order.items) && order.items.length){
        return order.items.map(function(item){
          const optionPrice = Number(item.optionPrice || 0);
          const quantity = Number(item.quantity || 0);
          return {
            itemType: item.itemType || "option",
            optionId: item.optionId || "",
            optionName: item.optionName || order.optionName || "",
            optionPrice: optionPrice,
            quantity: quantity,
            lineTotal: Number(item.lineTotal || optionPrice * quantity)
          };
        });
      }
      return [{
        itemType: "option",
        optionId: order.optionId || "",
        optionName: order.optionName || "",
        optionPrice: Number(order.saleAmount || order.totalPrice || 0),
        quantity: Number(order.quantity || 0),
        lineTotal: Number(order.saleAmount || order.totalPrice || 0)
      }];
    }

    function orderItemsText(order){
      return orderItems(order).map(function(item){
        return `${item.optionName} × ${item.quantity}개 / ${formatPrice(item.lineTotal)}`;
      }).join(" | ");
    }

    function orderItemsCompactText(order){
      const items = orderItems(order);
      if(!items.length) return "-";
      const first = items[0];
      const suffix = items.length > 1 ? ` 외 ${items.length - 1}건` : "";
      return `${first.optionName} × ${first.quantity}개${suffix}`;
    }

    function orderFullAddress(order){
      return [order.postalCode ? `(${order.postalCode})` : "", order.buyerAddress || "", order.buyerAddressDetail || ""]
        .filter(Boolean)
        .join(" ");

    function toDateInputValue(date){
      const d = new Date(date);
      if(Number.isNaN(d.getTime())) return "";
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function normalizeDateInputValue(value){
      const text = String(value || "").trim();
      if(!/^\d{4}-\d{2}-\d{2}$/.test(text)) return "";
      const date = new Date(text + "T00:00:00");
      if(Number.isNaN(date.getTime())) return "";
      return toDateInputValue(date) === text ? text : "";
    }

    function safeDateInputValue(value){
      if(!value) return "";
      if(typeof value === "string"){
        if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "" : toDateInputValue(date);
      }
      return toDateInputValue(value);
    }

    function orderDateRange(){
      const startValue = normalizeDateInputValue(adminOrderStartDate);
      const endValue = normalizeDateInputValue(adminOrderEndDate);
      const singleDay = startValue || endValue;
      const rangeStartValue = startValue || (!endValue ? "" : singleDay);
      const rangeEndValue = endValue || (!startValue ? "" : singleDay);
      const start = rangeStartValue ? new Date(rangeStartValue + "T00:00:00") : null;
      const end = rangeEndValue ? new Date(rangeEndValue + "T23:59:59.999") : null;
      return {
        start: start && !Number.isNaN(start.getTime()) ? start : null,
        end: end && !Number.isNaN(end.getTime()) ? end : null
      };
    }

    function isOrderInDateRange(order){
      const range = orderDateRange();
      if(!range.start && !range.end) return true;
      const createdAt = new Date(order.createdAt || 0);
      const time = createdAt.getTime();
      if(Number.isNaN(time)) return false;
      if(range.start && time < range.start.getTime()) return false;
      if(range.end && time > range.end.getTime()) return false;
      return true;
    }

    function findOrderProduct(order){
      return getProducts().find(function(product){

      }) || null;

    function findProductOption(product, item){
      if(!product || !Array.isArray(product.options)) return null;
      return product.options.find(function(option, index){
        const fallbackId = product.id + "_opt_" + index;
        return (option.id || fallbackId) === item.optionId || option.name === item.optionName;
      }) || null;
    }

    function calculateOrderSettlement(order, productOverride){
      const product = productOverride || findOrderProduct(order);
      const items = orderItems(order);
      const saleAmount = items.reduce(function(sum, item){
        return sum + Number(item.lineTotal || 0);
      }, 0) || Number(order.saleAmount || 0);
      const priceType = productPriceType(product);
      const vendorCommissionRate = productVendorCommissionRate(product);
      const productSupplyPrice = Number(product?.supplierPrice || 0);
      const supplyAmount = priceType === "commission" ? 0 : (items.length
        ? items.reduce(function(sum, item){
          const quantity = Number(item.quantity || 0);
          if(item.itemType === "base") return sum + productSupplyPrice * quantity;
          const option = findProductOption(product, item);
          const optionSupplyPrice = option && option.supplierPrice !== undefined
            ? Number(option.supplierPrice || 0)
            : productSupplyPrice;
          return sum + optionSupplyPrice * quantity;
        }, 0)
        : Number(order.supplyAmount || 0));
      const commissionRate = isDirectOrder(order) ? 0 : Number(order.curatorCommissionRate ?? product?.commissionRate ?? 0);
      const vendorCommissionAmount = priceType === "commission"
        ? Math.round(saleAmount * vendorCommissionRate / 100)
        : 0;
      const grossMargin = priceType === "commission" ? vendorCommissionAmount : saleAmount - supplyAmount;
      const curatorCommission = Math.round(saleAmount * commissionRate / 100);
      const localbeeProfit = grossMargin - curatorCommission;
      return {
        saleAmount: saleAmount,
        supplyAmount: supplyAmount,
        vendorCommissionAmount: vendorCommissionAmount,
        curatorCommissionRate: commissionRate,
        curatorCommission: curatorCommission,
        grossMargin: grossMargin,
        localbeeProfit: localbeeProfit
      };
    }

    function orderSettlement(order){
      const calculated = calculateOrderSettlement(order);
      const saleAmount = Number(order.saleAmount ?? calculated.saleAmount);
      const supplyAmount = order.supplyAmount !== undefined ? Number(order.supplyAmount || 0) : calculated.supplyAmount;
      const vendorCommissionAmount = order.vendorCommissionAmount !== undefined ? Number(order.vendorCommissionAmount || 0) : calculated.vendorCommissionAmount;
      const grossMargin = order.grossMargin !== undefined ? Number(order.grossMargin || 0) : calculated.grossMargin;
      const direct = isDirectOrder(order);
      const curatorCommissionRate = direct ? 0 : (order.curatorCommissionRate !== undefined ? Number(order.curatorCommissionRate || 0) : calculated.curatorCommissionRate);
      const curatorCommission = direct ? 0 : (order.curatorCommission !== undefined ? Number(order.curatorCommission || 0) : calculated.curatorCommission);
      const localbeeProfit = direct ? grossMargin : (order.localbeeProfit !== undefined ? Number(order.localbeeProfit || 0) : grossMargin - curatorCommission);
      return {
        saleAmount: saleAmount,
        supplyAmount: supplyAmount,
        vendorCommissionAmount: vendorCommissionAmount,
        curatorCommissionRate: curatorCommissionRate,
        curatorCommission: curatorCommission,
        grossMargin: grossMargin,
        localbeeProfit: localbeeProfit
      };
    }

    function applyStockDeltaForOrder(order, direction){
      const products = getProducts();
      const product = products.find(function(item){ return item.id === order.productId; });
      if(!product) return false;
      (Array.isArray(order.items) ? order.items : []).forEach(function(item){
        const quantity = Number(item.quantity || 0) * direction;
        if(!quantity) return;
        if(item.itemType === "base"){
          if(product.baseStock !== undefined){
            product.baseStock = Math.max(0, Number(product.baseStock || 0) - quantity);
          }else if(product.stock !== undefined){
            product.stock = Math.max(0, Number(product.stock || 0) - quantity);
          }else if(product.totalStock !== undefined){
            product.totalStock = Math.max(0, Number(product.totalStock || 0) - quantity);
          }
          // 재고 필드가 없는 기본상품은 MVP에서 차감하지 않는다.
          return;
        }
        const option = Array.isArray(product.options)
          ? product.options.find(function(optionItem){
            return (optionItem.id || "") === item.optionId || optionItem.name === item.optionName;
          })
          : null;
        if(option){
          option.stock = Math.max(0, Number(option.stock || 0) - quantity);
        }
      });
      product.status = isProductSoldOut(product) ? "soldout" : (product.status === "soldout" ? "selling" : product.status || "selling");
      saveProducts(products);
      return true;
    }

    function isStockDeductedStatus(status){
      return STOCK_DEDUCTED_STATUSES.includes(status);
    }

    function updateOrderStatus(orderId, status, options){
      const settings = options || {};
      const orders = readJson(STORAGE_KEYS.orders, []);
      const order = orders.find(function(item){ return item.id === orderId; });
      if(!order) return false;
      const oldStatus = order.status || "ordered";
      const newStatus = status || "ordered";
      const wasStockDeductedStatus = isStockDeductedStatus(oldStatus);
      const willBeStockDeductedStatus = isStockDeductedStatus(newStatus);
      if(!wasStockDeductedStatus && willBeStockDeductedStatus && !order.stockDeducted){
        applyStockDeltaForOrder(order, 1);
        order.stockDeducted = true;
      }
      if(wasStockDeductedStatus && newStatus === "canceled" && order.stockDeducted){
        applyStockDeltaForOrder(order, -1);
        order.stockDeducted = false;
      }
      order.status = status;
      saveOrders(orders);
      if(route() === "admin/orders" && !settings.skipRender){
        renderAdminOrders();
        document.querySelectorAll(`[data-order-status-message="${orderId}"]`).forEach(function(message){
          message.textContent = "저장됨";
        });
        return true;
      }
      document.querySelectorAll(`[data-order-current-status="${orderId}"]`).forEach(function(label){
        label.textContent = orderStatusLabel(status);
      });
      document.querySelectorAll(`[data-order-status-message="${orderId}"]`).forEach(function(message){
        message.textContent = "저장됨";
      });
      return true;
    }

    function downloadOrdersCSV(){
      try{
        const orders = JSON.parse(localStorage.getItem("dz_orders") || "[]");

        if(!Array.isArray(orders)){
          throw new Error("orders가 배열이 아닙니다.");
        }

        const safe = function(value){
          const str = String(value ?? "");
          return `"${str.replace(/"/g, '""')}"`;
        };
        const won = function(value){
          return Number(value || 0);
        };
        const headers = [
          "주문번호",
          "주문일시",
          "주문상태",
          "유입",
          "상품명",
          "선택상품",
          "총수량",
          "상품금액",
          "배송비",
          "총주문금액",
          "닉네임",
          "연락처",
          "주소",
          "상세주소",
          "출입방법",
          "요청사항",
          "결제수단",
          "결제자명"
        ];

        const rows = orders.map(function(order){
          const itemsText = (Array.isArray(order.items) ? order.items : []).map(function(item){
            return (item.optionName || "") + " x " + (item.quantity || 0) + "개";
          }).join(" / ");

          return [
            order.id || "",
            order.createdAt || "",
            order.status || "",
            order.ref || "direct",
            order.productTitle || "",
            itemsText,
            order.quantity || 0,
            won(order.saleAmount),
            won(order.shippingFee),
            won(order.totalPrice),
            order.buyerNickname || order.buyerName || "",
            order.buyerPhone || "",
            order.buyerAddress || "",
            order.buyerAddressDetail || "",
            order.entranceMethod || "",
            order.orderMemo || "",
            order.paymentMethod || "",
            order.payerName || order.depositorName || ""
          ];
        });

        const csv = [
          headers.map(safe).join(","),
          ...rows.map(function(row){ return row.map(safe).join(","); })
        ].join("\r\n");

        if(!csv){
          throw new Error("CSV 내용이 비어 있습니다.");
        }

        const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});

        if(blob.size <= 0){
          throw new Error("CSV Blob 크기가 0입니다.");
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "dangolzip_orders.csv";
        a.setAttribute("download", "dangolzip_orders.csv");
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();

        setTimeout(function(){
          if(a.parentNode) document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        }, 100);

        if(typeof showToast === "function"){
          showToast("CSV 파일을 다운로드했습니다.");
        }
      }catch(error){
        console.error("CSV 다운로드 실패:", error);
        if(typeof showToast === "function"){
          showToast("CSV 다운로드 실패: 콘솔을 확인해주세요.");
        }
      }
    }

      const curatorCommission = Math.max(1, Number(settlement.curatorCommission || 0));

    function curatorLink(ref){
      const base = location.href.split("#")[0].split("?")[0];
      return base + "?ref=" + encodeURIComponent(ref) + "#home";
    }

    function curatorProductLink(ref, productId){
      const base = location.href.split("#")[0].split("?")[0];
      return base + "?ref=" + encodeURIComponent(ref) + "&productId=" + encodeURIComponent(productId);
    }

    function getProductIdFromUrl(){
      const searchParams = new URLSearchParams(location.search || "");
      let productId = searchParams.get("productId");
      if(!productId && location.hash.includes("?")){
        const hashQuery = location.hash.split("?")[1] || "";
        productId = new URLSearchParams(hashQuery).get("productId");
      }
      return (productId || "").trim();
    }

    function getCuratorCodeFromUrl(){
      const searchParams = new URLSearchParams(location.search || "");
      let curatorCode = searchParams.get("curator");
      if(!curatorCode && location.hash.includes("?")){
        const hashQuery = location.hash.split("?")[1] || "";
        curatorCode = new URLSearchParams(hashQuery).get("curator");
      }
      return (curatorCode || "").trim();
    }

    function routeProductFromUrl(){
      const productId = getProductIdFromUrl();
      if(productId && !route().startsWith("product/")){
        history.replaceState(null, "", location.href.split("#")[0] + "#product/" + encodeURIComponent(productId));
      }
    }

    function routeCuratorFromUrl(){
      if(getProductIdFromUrl()) return;
      const curatorCode = getCuratorCodeFromUrl();
      if(curatorCode && !route().startsWith("curator/")){
        history.replaceState(null, "", location.href.split("#")[0] + "#curator/" + encodeURIComponent(curatorCode));
      }

    function curatorStats(ref){
      const visits = readJson(STORAGE_KEYS.visitLogs, []).filter(function(log){
        return (log.ref || "direct") === ref;
      }).length;
      const orders = readJson(STORAGE_KEYS.orders, []).filter(function(order){
        return orderRef(order) === ref && (order.status || "ordered") !== "canceled";
      });
      const totalAmount = orders.reduce(function(sum, order){
        return sum + Number(order.totalPrice || 0);
      }, 0);
      const saleAmount = orders.reduce(function(sum, order){
        return sum + orderSettlement(order).saleAmount;
      }, 0);
      const curatorCommission = orders.reduce(function(sum, order){
        return sum + orderSettlement(order).curatorCommission;
      }, 0);
      const localbeeProfit = orders.reduce(function(sum, order){
        return sum + orderSettlement(order).localbeeProfit;
      }, 0);
      const conversion = visits > 0 ? (orders.length / visits * 100).toFixed(1) : "0.0";
      return {
        visits: visits,
        orders: orders.length,
        totalAmount: totalAmount,
        saleAmount: saleAmount,
        curatorCommission: curatorCommission,
        localbeeProfit: localbeeProfit,
        conversion: conversion
      };
    }

    function nextCuratorCode(curatorsOverride){
      const curators = Array.isArray(curatorsOverride) ? curatorsOverride : getCurators();
      const maxNumber = curators.reduce(function(max, curator){
        const match = String(curator?.id || "").match(/^c(\d+)$/i);
        return match ? Math.max(max, Number(match[1] || 0)) : max;
      }, 0);
      return "c" + String(maxNumber + 1).padStart(3, "0");
    }

      return curatorApplicationsFor(curatorCode).some(function(application){
        return application.productId === productId && application.status !== "rejected";
      });
    }

    function curatorOrders(curatorCode){
      return readJson(STORAGE_KEYS.orders, []).filter(function(order){
        return orderRef(order) === curatorCode && (order.status || "ordered") !== "canceled";
      });
    }

    function curatorProductStats(curatorCode, productId){
      const orders = curatorOrders(curatorCode).filter(function(order){
        return order.productId === productId;
      });
      const quantity = orders.reduce(function(sum, order){ return sum + Number(order.quantity || 0); }, 0);
      const saleAmount = orders.reduce(function(sum, order){ return sum + orderSettlement(order).saleAmount; }, 0);
      const curatorCommission = orders.reduce(function(sum, order){ return sum + orderSettlement(order).curatorCommission; }, 0);
      const localbeeProfit = orders.reduce(function(sum, order){ return sum + orderSettlement(order).localbeeProfit; }, 0);
      return {
        orders: orders.length,
        quantity: quantity,
        saleAmount: saleAmount,
        curatorCommission: curatorCommission,
        localbeeProfit: localbeeProfit
      };
    }

    function curatorSettlementSummary(curatorCode){
      const orders = curatorOrders(curatorCode);
      const saleAmount = orders.reduce(function(sum, order){ return sum + orderSettlement(order).saleAmount; }, 0);
      const curatorCommission = orders.reduce(function(sum, order){ return sum + orderSettlement(order).curatorCommission; }, 0);
      const confirmedCommission = orders
        .filter(function(order){ return isStockDeductedStatus(order.status || "ordered"); })
        .reduce(function(sum, order){ return sum + orderSettlement(order).curatorCommission; }, 0);
      const pendingCommission = orders
        .filter(function(order){ return (order.status || "ordered") === "ordered"; })
        .reduce(function(sum, order){ return sum + orderSettlement(order).curatorCommission; }, 0);
      return {
        saleAmount: saleAmount,
        curatorCommission: curatorCommission,
        confirmedCommission: confirmedCommission,
        pendingCommission: pendingCommission
      };
    }

    function curatorSalesRows(curatorCode){
      const products = getProducts();
      const rows = new Map();
      curatorOrders(curatorCode).forEach(function(order){
        const productId = order.productId || "";
        const product = products.find(function(item){ return item.id === productId; });
        const key = productId || order.productTitle || "unknown";
        const row = rows.get(key) || {
          productId: productId,
          title: product?.title || order.productTitle || "상품",
          orders: 0,
          quantity: 0,
          saleAmount: 0,
          curatorCommission: 0,
          statuses: {},
          searchTitle: String(product?.title || order.productTitle || "").trim(),
          searchBaseItemName: String(product?.baseItemName || "").trim()
        };
        const status = order.status || "ordered";
        row.orders += 1;
        row.quantity += Number(order.quantity || 0);
        row.saleAmount += orderSettlement(order).saleAmount;
        row.curatorCommission += orderSettlement(order).curatorCommission;
        row.statuses[status] = (row.statuses[status] || 0) + 1;
        rows.set(key, row);
      });
      return Array.from(rows.values());
    }

    function renderCuratorStatusSummary(statuses){
      const rows = Object.keys(statuses || {});
      if(!rows.length) return "-";
      return rows.map(function(status){
        return `${orderStatusLabel(status)} ${statuses[status]}건`;
      }).join(" · ");
    }

    function matchesCuratorSalesKeyword(row, keyword){
      const normalizedKeyword = String(keyword || "").trim();
      if(!normalizedKeyword) return true;
      const title = String(row.searchTitle || "").trim();
      const baseItemName = String(row.searchBaseItemName || "").trim();
      if(/^\d+$/.test(normalizedKeyword)){
        return title === normalizedKeyword || baseItemName === normalizedKeyword;
      }
      const lowerKeyword = normalizedKeyword.toLowerCase();
      return title.toLowerCase().includes(lowerKeyword) || baseItemName.toLowerCase().includes(lowerKeyword);
    }

    function normalizeSettlementStatus(status){
      return status === "paid" ? "paid" : "pending";
    }

    function settlementStatusLabel(status){
      return normalizeSettlementStatus(status) === "paid" ? "정산완료" : "정산예정";
    }

    function renderSettlementStatusBadge(status){
      const normalized = normalizeSettlementStatus(status);
      return `<span class="settlement-status-badge ${normalized === "paid" ? "paid" : ""}">${settlementStatusLabel(normalized)}</span>`;
    }

    function settlementRequestStatusLabel(status){
      if(status === "paid") return "지급완료";
      if(status === "rejected") return "반려";
      return "신청완료";
    }

    function settlementRequestStatusClass(status){
      if(status === "paid") return "paid";
      if(status === "rejected") return "rejected";
      return "";
    }

    function renderSettlementRequestStatus(status){
      const normalized = status === "paid" || status === "rejected" ? status : "requested";
      return `<span class="settlement-status-badge ${settlementRequestStatusClass(normalized)}">${settlementRequestStatusLabel(normalized)}</span>`;
    }

    function settlementTaxAmount(amount){
      return Math.floor(Number(amount || 0) * 0.033);
    }

    function settlementPayoutAmount(amount){
      const requestedAmount = Number(amount || 0);
      return requestedAmount - settlementTaxAmount(requestedAmount);
    }

    function addDaysToDateInput(dateValue, days){
      const date = dateStart(dateValue);
      if(!date) return "";
      date.setDate(date.getDate() + Number(days || 0));
      return toDateInputValue(date);
    }

    function orderSettlementDeadline(order){
      const product = findOrderProduct(order);
      return String(order.orderDeadline || product?.orderDeadline || product?.deadline || "").trim();
    }

    function orderSettlementAvailableAt(order){
      return addDaysToDateInput(orderSettlementDeadline(order), 30);
    }

    function settlementDdayLabel(dateValue){
      const target = dateStart(dateValue);
      if(!target) return "";
      const today = todayStart();
      const diff = Math.ceil((target.getTime() - today.getTime()) / 86400000);
      if(diff > 0) return "D-" + diff;
      if(diff === 0) return "D-DAY";
      return "신청 가능";
    }

    function curatorSettlementRequests(curatorCode){
      return getSettlementRequests().filter(function(request){
        return request.curatorCode === curatorCode;
      }).sort(function(a, b){
        return new Date(b.requestedAt || 0).getTime() - new Date(a.requestedAt || 0).getTime();
      });
    }

    function curatorRequestedSettlementOrderIds(curatorCode){
      const ids = new Set();
      curatorSettlementRequests(curatorCode)
        .filter(function(request){ return request.status === "requested" || request.status === "paid"; })
        .forEach(function(request){
          if(Array.isArray(request.eligibleOrderIds)){
            request.eligibleOrderIds.forEach(function(orderId){
              if(orderId) ids.add(orderId);
            });
          }
        });
      return ids;
    }

    function curatorLegacyRequestedSettlementAmount(curatorCode){
      return curatorSettlementRequests(curatorCode)
        .filter(function(request){
          return (request.status === "requested" || request.status === "paid") && !Array.isArray(request.eligibleOrderIds);
        })
        .reduce(function(sum, request){ return sum + Number(request.requestedAmount || 0); }, 0);
    }

    function curatorSettlementAvailability(curatorCode){
      const today = toDateInputValue(todayStart());
      const requestedOrderIds = curatorRequestedSettlementOrderIds(curatorCode);
      const result = {
        pendingOrders: [],
        availableOrders: [],
        pendingAmount: 0,
        availableAmountRaw: 0,
        availableAmount: 0,
        requestedAmount: 0,
        paidAmount: 0,
        eligibleOrderIds: [],
        availableAt: "",
        nextAvailableAt: "",
        periodLabel: ""
      };
      curatorSettlementRequests(curatorCode).forEach(function(request){
        if(request.status === "requested") result.requestedAmount += Number(request.requestedAmount || 0);
        if(request.status === "paid") result.paidAmount += Number(request.requestedAmount || 0);
      });
      curatorOrders(curatorCode)
        .filter(function(order){
          return isStockDeductedStatus(order.status || "ordered") && !requestedOrderIds.has(order.id || "");
        })
        .forEach(function(order){
          const commission = orderSettlement(order).curatorCommission;
          const deadline = orderSettlementDeadline(order);
          const availableAt = orderSettlementAvailableAt(order);
          const row = {
            orderId: order.id || "",
            amount: commission,
            deadline: deadline,
            availableAt: availableAt
          };
          if(availableAt && today >= availableAt){
            result.availableOrders.push(row);
            result.availableAmountRaw += commission;
          }else{
            result.pendingOrders.push(row);
            result.pendingAmount += commission;
          }
        });
      const legacyRequestedAmount = curatorLegacyRequestedSettlementAmount(curatorCode);
      result.availableAmount = Math.max(0, result.availableAmountRaw - legacyRequestedAmount);
      result.eligibleOrderIds = result.availableOrders.map(function(row){ return row.orderId; }).filter(Boolean);
      result.availableAt = result.availableOrders.reduce(function(latest, row){
        if(!row.availableAt) return latest;
        return !latest || row.availableAt > latest ? row.availableAt : latest;
      }, "");
      result.nextAvailableAt = result.pendingOrders
        .map(function(row){ return row.availableAt; })
        .filter(Boolean)
        .sort()[0] || "";
      const deadlines = result.availableOrders.map(function(row){ return row.deadline; }).filter(Boolean).sort();
      if(deadlines.length){
        const first = deadlines[0];
        const last = deadlines[deadlines.length - 1];
        result.periodLabel = first === last ? formatDate(first) : formatDate(first) + " ~ " + formatDate(last);
      }
      return result;
    }

    function curatorAvailableSettlement(curatorCode){
      const availability = curatorSettlementAvailability(curatorCode);
      const amount = availability.availableAmount;
      return {
        requestedAmount: amount,
        withholdingTaxRate: WITHHOLDING_TAX_RATE,
        withholdingTaxAmount: settlementTaxAmount(amount),
        payoutAmount: settlementPayoutAmount(amount),
        eligibleOrderIds: availability.eligibleOrderIds,
        availableAt: availability.availableAt,
        nextAvailableAt: availability.nextAvailableAt,
        periodLabel: availability.periodLabel,
        pendingAmount: availability.pendingAmount,
        requestedSettlementAmount: availability.requestedAmount,
        paidSettlementAmount: availability.paidAmount
      };
    }

    function curatorSettlementRows(curatorCode){
      const products = getProducts();
      return curatorOrders(curatorCode).map(function(order){
        const product = products.find(function(item){ return item.id === (order.productId || ""); });
        const settlement = orderSettlement(order);
        const orderDateValue = safeDateInputValue(order.createdAt);
        return {
          orderId: order.id || "",
          orderDateValue: orderDateValue,
          orderDate: formatDateTime(order.createdAt),
          productId: order.productId || "",
          productTitle: product?.title || order.productTitle || "상품명 없음",
          quantity: Number(order.quantity || 0),
          saleAmount: settlement.saleAmount,
          curatorCommission: settlement.curatorCommission,
          orderStatus: order.status || "ordered",
          settlementStatus: normalizeSettlementStatus(order.settlementStatus),
          settlementAvailableAt: orderSettlementAvailableAt(order)
        };
      }).sort(function(a, b){
        return String(b.orderDateValue || "").localeCompare(String(a.orderDateValue || "")) || String(b.orderId).localeCompare(String(a.orderId));
      });
    }

    function filteredCuratorSettlementRows(curatorCode){
      const startDate = normalizeDateInputValue(curatorSettlementStartDate);
      const endDate = normalizeDateInputValue(curatorSettlementEndDate);
      const keyword = curatorSettlementProductKeyword.trim().toLowerCase();
      const statusFilter = curatorSettlementStatusFilter === "paid" || curatorSettlementStatusFilter === "pending"
        ? curatorSettlementStatusFilter
        : "all";
      return curatorSettlementRows(curatorCode).filter(function(row){
        if(startDate && (!row.orderDateValue || row.orderDateValue < startDate)) return false;
        if(endDate && (!row.orderDateValue || row.orderDateValue > endDate)) return false;
        if(statusFilter !== "all" && row.settlementStatus !== statusFilter) return false;
        if(keyword && !String(row.productTitle || "").toLowerCase().includes(keyword)) return false;
        return true;
      });
    }

    function curatorSettlementProductSummary(rows){
      const summary = new Map();
      rows.forEach(function(row){
        const key = row.productId || row.productTitle;
        const item = summary.get(key) || {
          productTitle: row.productTitle,
          quantity: 0,
          saleAmount: 0,
          curatorCommission: 0
        };
        item.quantity += row.quantity;
        item.saleAmount += row.saleAmount;
        item.curatorCommission += row.curatorCommission;
        summary.set(key, item);
      });
      return Array.from(summary.values()).sort(function(a, b){
        return b.saleAmount - a.saleAmount || a.productTitle.localeCompare(b.productTitle);
      });
    }

      if(!curator) return;
      const available = curatorAvailableSettlement(curator.id);

      const accountNumber = (document.getElementById("settlementAccountNumber")?.value || "").trim();
      const accountHolder = (document.getElementById("settlementAccountHolder")?.value || "").trim();

        return;

      requests.push({

        curatorCode: curator.id,
        curatorName: curator.name || curator.id,
        requestedAmount: available.requestedAmount,
        withholdingTaxRate: WITHHOLDING_TAX_RATE,

      curatorSettlementFormOpen = false;
      curatorSettlementMessage = "정산 신청이 접수되었습니다.";

      const product = getProducts().find(function(item){ return item.id === productId; });
      if(!canCuratorApplyProduct(product)){
        showToast("신청 가능한 상품이 아닙니다.");
        return;
      }
      if(hasCuratorApplication(curatorCode, productId)){
        showToast("이미 신청한 상품입니다.");
        return;
      }
      const applications = getCuratorApplications();
      applications.push({
        id: "app_" + Date.now(),
        curatorCode: curatorCode,
        productId: product.id,
        productTitle: product.title || "",
        status: "approved",
        createdAt: new Date().toISOString()
      });
      saveCuratorApplications(applications);
      renderCuratorHome(curatorCode, route().split("/")[2] || "apply");
      showToast("공동구매 상품이 신청되었습니다.");

    function updateProductCalculation(){
      const salePrice = toNumber(document.getElementById("salePrice")?.value);
      const supplierPrice = toNumber(document.getElementById("supplierPrice")?.value);
      const commissionRate = toNumber(document.getElementById("commissionRate")?.value);
      const priceType = document.getElementById("priceType")?.value === "commission" ? "commission" : "supply";
      const vendorCommissionRateValue = document.getElementById("vendorCommissionRate")?.value ?? "";
      const vendorCommissionRate = vendorCommissionRateValue === "" ? 30 : toNumber(vendorCommissionRateValue);
      const shippingFee = toNumber(document.getElementById("shippingFee")?.value);
      const margin = priceType === "commission"
        ? Math.round(salePrice * vendorCommissionRate / 100)
        : salePrice - supplierPrice;
      const commission = Math.round(salePrice * commissionRate / 100);
      const localbee = margin - commission;

      const targets = {
        calcMargin: margin,
        calcCommission: commission,
        calcLocalbee: localbee,
        calcShipping: shippingFee
      };
      Object.keys(targets).forEach(function(id){
        const target = document.getElementById(id);
        if(target) target.textContent = formatPrice(targets[id]);
      });
    }

    function updatePriceTypeFields(){
      const commission = document.getElementById("priceType")?.value === "commission";
      const supplierField = document.getElementById("supplierPriceField");
      const vendorCommissionField = document.getElementById("vendorCommissionRateField");
      const supplierInput = document.getElementById("supplierPrice");
      const vendorCommissionInput = document.getElementById("vendorCommissionRate");
      if(supplierField) supplierField.hidden = commission;
      if(vendorCommissionField) vendorCommissionField.hidden = !commission;
      if(supplierInput) supplierInput.disabled = commission;
      if(vendorCommissionInput) vendorCommissionInput.disabled = !commission;
      updateProductCalculation();
    }

    async function handleImageInput(input){
      const files = Array.from(input.files || []);
      if(!files.length) return;

      const accepted = [];
      for(const file of files){
        try{
          accepted.push(await compressImageFile(file));
        }catch(error){
          showImageWarning("일부 이미지를 압축하지 못했습니다. 해당 이미지는 제외하고 계속 진행합니다.");
        }
      }

      if(input.id === "thumbnailInput"){
        productImageDraft.thumbnail = accepted[0] || "";
      }
      if(input.id === "detailImagesInput"){
        productImageDraft.detailImages = productImageDraft.detailImages.concat(accepted);
      }
      input.value = "";
      renderImagePreview();
    }
